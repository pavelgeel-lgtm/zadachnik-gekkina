<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Задачник Геккина — 3XMEDIA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;800&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0C0F1A; --bg2:#131728; --bg3:#1A1F35;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.13);
  --text:#E8EAF2; --text2:#8A90AA; --text3:#555C78;
  --accent:#3D6FFF; --accent2:#6B8FFF;
  --p-high:#FF4A4A; --p-mid:#F0A020; --p-low:#22C97A; --p-none:#555C78;
  --hi:#FFD84A;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

header{padding:32px 32px 0;display:flex;align-items:flex-end;justify-content:space-between;gap:20px;flex-wrap:wrap}
.logo-block{display:flex;flex-direction:column;gap:4px}
.logo-sub{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:400;letter-spacing:.15em;color:var(--text3)}
.logo-title{font-family:'Unbounded',sans-serif;font-size:clamp(20px,4vw,36px);font-weight:800;color:var(--text);line-height:1.1;letter-spacing:-.02em}
.logo-title span{color:var(--accent2)}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.header-stats{display:flex;gap:10px;flex-wrap:wrap}
.hstat{background:var(--bg3);border:0.5px solid var(--border2);border-radius:10px;padding:10px 14px;text-align:center}
.hstat-n{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:600;color:var(--text)}
.hstat-l{font-size:11px;color:var(--text3);margin-top:2px}

.btn-add-month{background:var(--accent);border:none;border-radius:10px;padding:11px 18px;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;color:#fff;cursor:pointer;letter-spacing:.03em;transition:opacity .15s;white-space:nowrap}
.btn-add-month:hover{opacity:.85}

.progress-wrap{padding:22px 32px 0}
.progress-track{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s ease}
.progress-label{font-size:11px;color:var(--text3);margin-top:6px;font-family:'Unbounded',sans-serif;font-weight:300}

.legend{display:flex;gap:16px;padding:14px 32px 0;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3)}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

.months{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:16px;padding:18px 32px 40px}

.month-card{background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.month-header{padding:14px 18px 12px;border-bottom:0.5px solid var(--border);display:flex;align-items:center;gap:10px}
.month-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.month-info{flex:1;min-width:0}
.month-name{font-family:'Unbounded',sans-serif;font-size:13px;font-weight:600;letter-spacing:.01em}
.month-subtitle{font-size:11px;color:var(--text3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.month-count{font-size:11px;font-family:'Unbounded',sans-serif;color:var(--text3);background:var(--bg3);padding:3px 10px;border-radius:20px;flex-shrink:0}
.month-del{width:24px;height:24px;border-radius:6px;border:0.5px solid transparent;background:transparent;cursor:pointer;color:var(--text3);font-size:15px;display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s,border-color .15s;flex-shrink:0;opacity:0}
.month-header:hover .month-del{opacity:1}
.month-del:hover{color:var(--p-high);background:rgba(255,74,74,0.1);border-color:rgba(255,74,74,0.2)}

.tasks-list{padding:10px 14px;display:flex;flex-direction:column;gap:4px;flex:1}

.task-item{display:flex;align-items:center;gap:9px;padding:7px 9px;border-radius:8px;background:var(--bg3);border:0.5px solid transparent;transition:border-color .15s,opacity .15s,background .15s;cursor:pointer}
.task-item:hover{border-color:var(--border2)}
.task-item.done{opacity:.42}
.task-item.done .task-text{text-decoration:line-through}
.task-item.hi{background:rgba(255,216,74,0.07);border-color:rgba(255,216,74,0.3)}
.task-item.hi .task-text{color:var(--hi)}

.prio-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .15s}
.prio-dot:hover{transform:scale(1.5)}
.task-text{font-size:13px;color:var(--text);flex:1;line-height:1.4;user-select:none}
.task-done-btn{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:background .15s,border-color .15s;color:transparent;font-size:10px}
.task-done-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.task-item.done .task-done-btn{background:var(--accent);border-color:var(--accent);color:#fff}
.task-del-btn{width:18px;height:18px;border-radius:4px;border:none;background:transparent;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:14px;transition:color .15s,background .15s;opacity:0}
.task-item:hover .task-del-btn{opacity:1}
.task-del-btn:hover{color:var(--p-high);background:rgba(255,74,74,0.1)}

.add-task-area{padding:0 14px 12px}
.add-task-row{display:flex;gap:6px;align-items:center}
.add-task-input{flex:1;background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;padding:7px 11px;font-family:'Golos Text',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .15s}
.add-task-input::placeholder{color:var(--text3)}
.add-task-input:focus{border-color:var(--border2)}
.prio-select{background:var(--bg3);border:0.5px solid var(--border);border-radius:8px;padding:7px 6px;font-size:13px;color:var(--text2);outline:none;cursor:pointer;appearance:none;-webkit-appearance:none;min-width:34px;text-align:center}
.add-btn{background:var(--accent);border:none;border-radius:8px;padding:7px 13px;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s;white-space:nowrap}
.add-btn:hover{opacity:.85}

.milestone-bar{margin:0 14px 12px;padding:7px 11px;border-radius:8px;border-left:3px solid var(--border2);font-size:11px;color:var(--text3);background:var(--bg3);line-height:1.5}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;align-items:center;justify-content:center;padding:20px}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:20px;padding:28px;width:100%;max-width:440px}
.modal-title{font-family:'Unbounded',sans-serif;font-size:15px;font-weight:700;color:var(--text);margin-bottom:20px;letter-spacing:-.01em}
.modal-title span{color:var(--accent2)}
.field-label{font-size:10px;color:var(--text3);margin-bottom:5px;display:block;letter-spacing:.07em;text-transform:uppercase}
.modal-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:10px;padding:10px 13px;font-family:'Golos Text',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:14px}
.modal-input:focus{border-color:var(--accent)}
.modal-input::placeholder{color:var(--text3)}
.color-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:22px}
.color-opt{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:border-color .15s,transform .15s;flex-shrink:0}
.color-opt:hover{transform:scale(1.15)}
.color-opt.sel{border-color:#fff}
.modal-btns{display:flex;gap:10px;justify-content:flex-end}
.btn-cancel{background:var(--bg3);border:0.5px solid var(--border2);border-radius:10px;padding:10px 18px;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;color:var(--text2);cursor:pointer;transition:opacity .15s}
.btn-cancel:hover{opacity:.8}
.btn-confirm{background:var(--accent);border:none;border-radius:10px;padding:10px 22px;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s}
.btn-confirm:hover{opacity:.85}

footer{padding:14px 32px;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.footer-l{font-family:'Unbounded',sans-serif;font-size:10px;font-weight:300;color:var(--text3);letter-spacing:.08em}

@media(max-width:600px){
  header,.progress-wrap,.months,.legend,footer{padding-left:16px;padding-right:16px}
  .months{grid-template-columns:1fr}
  .header-right{width:100%}
}
</style>
</head>

<header>
  <div class="logo-block">
    <div class="logo-sub">3XMEDIA PRODUCTION · 2025</div>

  </div>
  <div class="header-right">
    <div class="header-stats">
      <div class="hstat"><div class="hstat-n" id="s-total">0</div><div class="hstat-l">всего</div></div>
      <div class="hstat"><div class="hstat-n" id="s-done">0</div><div class="hstat-l">готово</div></div>
      <div class="hstat"><div class="hstat-n" id="s-left">0</div><div class="hstat-l">осталось</div></div>
    </div>
    <button class="btn-add-month" onclick="openModal()">+ новый месяц</button>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  <div class="progress-label" id="plabel">0% выполнено</div>
</div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:var(--p-high)"></div>высокий</div>
  <div class="leg"><div class="leg-dot" style="background:var(--p-mid)"></div>средний</div>
  <div class="leg"><div class="leg-dot" style="background:var(--p-low)"></div>низкий</div>
  <div class="leg"><div class="leg-dot" style="background:var(--p-none)"></div>без приоритета · нажми точку — смена</div>
  <div class="leg"><div class="leg-dot" style="background:var(--hi);opacity:.85"></div>клик по задаче — выделить / убрать</div>
</div>

<div class="months" id="months-container"></div>

<footer>
  <div class="footer-l">ЗАДАЧНИК ГЕККИНА · АПР–СЕН 2025</div>
  <div class="footer-l" id="save-info">данные сохраняются в браузере</div>
</footer>

<!-- MODAL -->
<div class="overlay" id="overlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-title">Новый <span>месяц</span></div>
    <label class="field-label">Название</label>
    <input class="modal-input" id="m-name" type="text" placeholder="Октябрь" maxlength="40" onkeydown="if(event.key==='Enter')confirmAdd()">
    <label class="field-label">Подзаголовок (необязательно)</label>
    <input class="modal-input" id="m-sub" type="text" placeholder="Краткое описание задач на месяц..." maxlength="80">
    <label class="field-label">Контрольная точка (необязательно)</label>
    <input class="modal-input" id="m-mile" type="text" placeholder="Что должно быть готово к концу месяца" maxlength="120">
    <label class="field-label">Цвет месяца</label>
    <div class="color-row" id="color-row"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-confirm" onclick="confirmAdd()">Создать</button>
    </div>
  </div>
</div>

<script>
const PALETTE=['#3D6FFF','#22C97A','#9B6FFF','#F0A020','#FF4A4A','#20C0D8','#FF6FB0','#F7C948','#7ED8A6','#E8744A','#56B4E0','#C97B22'];
const PRIOS=['high','mid','low','none'];
const PC={high:'#FF4A4A',mid:'#F0A020',low:'#22C97A',none:'#555C78'};
const DEFAULT_COLOR_IDX=0;
let selColor=PALETTE[0];

// build color picker
const cr=document.getElementById('color-row');
PALETTE.forEach((c,i)=>{
  const el=document.createElement('div');
  el.className='color-opt'+(i===0?' sel':'');
  el.style.background=c;
  el.onclick=()=>{selColor=c;document.querySelectorAll('.color-opt').forEach(x=>x.classList.remove('sel'));el.classList.add('sel')};
  cr.appendChild(el);
});

function openModal(){
  document.getElementById('m-name').value='';
  document.getElementById('m-sub').value='';
  document.getElementById('m-mile').value='';
  selColor=PALETTE[0];
  document.querySelectorAll('.color-opt').forEach((x,i)=>x.classList.toggle('sel',i===0));
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-name').focus(),80);
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function closeOnOverlay(e){if(e.target===document.getElementById('overlay'))closeModal()}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

function confirmAdd(){
  const name=document.getElementById('m-name').value.trim();
  if(!name){document.getElementById('m-name').focus();return}
  DATA.push({
    id:'m'+Date.now(),
    name,
    subtitle:document.getElementById('m-sub').value.trim(),
    milestone:document.getElementById('m-mile').value.trim(),
    color:selColor,
    tasks:[]
  });
  saveData();render();closeModal();
  setTimeout(()=>{const cs=document.querySelectorAll('.month-card');if(cs.length)cs[cs.length-1].scrollIntoView({behavior:'smooth',block:'start'})},80);
}

  ]},
  {id:'sep',name:'Сентябрь',subtitle:'Боевой запуск · Параллельная инвентаризация',milestone:'Система в бою, инвентаризация идёт параллельно',tasks:[
    {t:'Полный боевой запуск в первом проекте',p:'high',done:false,hi:false},
    {t:'Мультипроектный склад: остатки между проектами',p:'mid',done:false,hi:false},
    {t:'Разграничение доступа по проектам',p:'mid',done:false,hi:false},
    {t:'Параллельная инвентаризация во время боевой работы',p:'high',done:false,hi:false},
    {t:'Аналитика: сравнение бюджет/факт по проектам',p:'mid',done:false,hi:false},
  ]},
];

function loadData(){try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r)}catch(e){}return JSON.parse(JSON.stringify(DEFAULTS))}
function saveData(){try{localStorage.setItem(KEY,JSON.stringify(DATA));document.getElementById('save-info').textContent='сохранено · '+new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}catch(e){}}

let DATA=loadData();

const COLOR_MAP={apr:'#3D6FFF',may:'#22C97A',jun:'#9B6FFF',jul:'#F0A020',aug:'#FF4A4A',sep:'#20C0D8'};
function mColor(m){return m.color||COLOR_MAP[m.id]||'#3D6FFF'}

function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function cyclePrio(mid,ti,e){
  e.stopPropagation();
  const m=DATA.find(x=>x.id===mid);if(!m)return;
  m.tasks[ti].p=PRIOS[(PRIOS.indexOf(m.tasks[ti].p)+1)%PRIOS.length];
  saveData();render();
}
function toggleDone(mid,ti,e){
  e.stopPropagation();
  const m=DATA.find(x=>x.id===mid);if(!m)return;
  m.tasks[ti].done=!m.tasks[ti].done;
  saveData();render();
}
function toggleHi(mid,ti){
  const m=DATA.find(x=>x.id===mid);if(!m)return;
  m.tasks[ti].hi=!m.tasks[ti].hi;
  saveData();render();
}
function delTask(mid,ti,e){
  e.stopPropagation();
  const m=DATA.find(x=>x.id===mid);if(!m)return;
  m.tasks.splice(ti,1);saveData();render();
}
function delMonth(mid,e){
  e.stopPropagation();
  if(!confirm('Удалить месяц «'+DATA.find(x=>x.id===mid)?.name+'» со всеми задачами?'))return;
  DATA=DATA.filter(x=>x.id!==mid);saveData();render();
}
function addTask(mid){
  const inp=document.getElementById('inp-'+mid);
  const sel=document.getElementById('sel-'+mid);
  const txt=inp.value.trim();if(!txt){inp.focus();return}
  const m=DATA.find(x=>x.id===mid);if(!m)return;
  m.tasks.push({t:txt,p:sel.value,done:false,hi:false});
  inp.value='';saveData();render();
  setTimeout(()=>{const el=document.getElementById('inp-'+mid);if(el)el.focus()},40);
}

function updateStats(){
  let tot=0,dn=0;
  DATA.forEach(m=>{tot+=m.tasks.length;dn+=m.tasks.filter(t=>t.done).length});
  const pct=tot?Math.round(dn/tot*100):0;
  document.getElementById('s-total').textContent=tot;
  document.getElementById('s-done').textContent=dn;
  document.getElementById('s-left').textContent=tot-dn;
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('plabel').textContent=pct+'% выполнено — '+dn+' из '+tot+' задач';
}

function render(){
  const c=document.getElementById('months-container');
  c.innerHTML='';
  DATA.forEach(month=>{
    const col=mColor(month);
    const dn=month.tasks.filter(t=>t.done).length;
    const card=document.createElement('div');
    card.className='month-card';
    const tasks=month.tasks.map((t,i)=>{
      const pc=PC[t.p]||PC.none;
      const cls='task-item'+(t.done?' done':'')+(t.hi?' hi':'');
      return `<div class="${cls}" onclick="toggleHi('${month.id}',${i})">
        <div class="prio-dot" style="background:${pc}" title="Сменить приоритет" onclick="cyclePrio('${month.id}',${i},event)"></div>
        <span class="task-text">${esc(t.t)}</span>
        <button class="task-done-btn" onclick="toggleDone('${month.id}',${i},event)" title="${t.done?'Снять':'Готово'}">✓</button>
        <button class="task-del-btn" onclick="delTask('${month.id}',${i},event)" title="Удалить">×</button>
      </div>`;
    }).join('')||'<div style="font-size:12px;color:var(--text3);padding:8px 2px">Пока нет задач — добавь ниже</div>';

    card.innerHTML=`
      <div class="month-header">
        <div class="month-dot" style="background:${col}"></div>
        <div class="month-info">
          <div class="month-name" style="color:${col}">${esc(month.name)}</div>
          ${month.subtitle?`<div class="month-subtitle">${esc(month.subtitle)}</div>`:''}
        </div>
        <div class="month-count">${dn}/${month.tasks.length}</div>
        <button class="month-del" onclick="delMonth('${month.id}',event)" title="Удалить месяц">×</button>
      </div>
      <div class="tasks-list">${tasks}</div>
      ${month.milestone?`<div class="milestone-bar">→ ${esc(month.milestone)}</div>`:''}
      <div class="add-task-area">
        <div class="add-task-row">
          <input class="add-task-input" id="inp-${month.id}" type="text" placeholder="Новая задача..." maxlength="200"
            onkeydown="if(event.key==='Enter')addTask('${month.id}')">
          <select class="prio-select" id="sel-${month.id}">
            <option value="high">🔴</option>
            <option value="mid" selected>🟡</option>
            <option value="low">🟢</option>
            <option value="none">⚪</option>
          </select>
          <button class="add-btn" onclick="addTask('${month.id}')">+ добавить</button>
        </div>
      </div>`;
    c.appendChild(card);
  });
  updateStats();
}

render();
</script>
</body>
</html>
