<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Задачник Геккина</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300;400;600;800&family=Golos+Text:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#0C0F1A;--bg2:#131728;--bg3:#1A1F35;--bg4:#0F1222;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#E8EAF2;--text2:#8A90AA;--text3:#555C78;
  --accent:#3D6FFF;--accent2:#6B8FFF;
  --ph:#FF4A4A;--pm:#F0A020;--pl:#22C97A;--pn:#555C78;
  --hi:#FFD84A;--hi-bg:rgba(255,216,74,0.07);--hi-border:rgba(255,216,74,0.28);
  --drag-over:rgba(61,111,255,0.12);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Golos Text',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ── HEADER ── */
header{
  padding:28px 28px 0;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;
  position:sticky;top:0;background:var(--bg4);z-index:50;
  border-bottom:0.5px solid var(--border);padding-bottom:16px;
  backdrop-filter:blur(12px);
  width:100%;box-sizing:border-box;
}
.logo{font-family:'Unbounded',sans-serif;font-size:clamp(16px,3vw,26px);font-weight:800;letter-spacing:-.02em;white-space:nowrap}
.logo span{color:var(--accent2)}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.header-stats{display:flex;gap:10px}
.hstat{background:var(--bg3);border:0.5px solid var(--border2);border-radius:8px;padding:7px 13px;text-align:center;min-width:54px}
.hstat-n{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:600}
.hstat-l{font-size:10px;color:var(--text3);margin-top:1px}
.btn{border:none;border-radius:9px;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .15s,background .15s;padding:9px 16px;letter-spacing:.02em}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.85}
.btn-ghost{background:var(--bg3);color:var(--text2);border:0.5px solid var(--border2)}
.btn-ghost:hover{opacity:.8}

/* status dot */
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3);transition:background .3s;flex-shrink:0}
.sync-dot.ok{background:var(--pl)}
.sync-dot.err{background:var(--ph)}
.sync-dot.loading{background:var(--pm);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* PROGRESS */
.progress-wrap{padding:14px 28px 0}
.progress-track{height:2px;background:var(--bg3);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:2px;transition:width .4s}
.progress-label{font-size:10px;color:var(--text3);margin-top:5px;font-family:'Unbounded',sans-serif;font-weight:300}

/* LEGEND */
.legend{display:flex;gap:14px;padding:10px 28px 0;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3)}
.leg-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* MONTHS GRID */
.months{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;padding:16px 28px 40px;width:100%;align-items:start}

/* MONTH CARD */
.month-card{
  background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;
  transition:border-color .2s;
}
.month-card.drag-over{border-color:var(--accent);background:var(--drag-over)}

.month-header{
  padding:13px 16px 11px;border-bottom:0.5px solid var(--border);
  display:flex;align-items:center;gap:9px;cursor:pointer;
  user-select:none;-webkit-user-select:none;
}
.month-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.month-info{flex:1;min-width:0}
.month-name{font-family:'Unbounded',sans-serif;font-size:12px;font-weight:600;letter-spacing:.01em}
.month-subtitle{font-size:10px;color:var(--text3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.month-count{font-size:10px;font-family:'Unbounded',sans-serif;color:var(--text3);background:var(--bg3);padding:2px 9px;border-radius:20px;flex-shrink:0}
.month-toggle{
  width:22px;height:22px;border-radius:6px;border:0.5px solid var(--border);
  background:transparent;cursor:pointer;color:var(--text3);font-size:11px;
  display:flex;align-items:center;justify-content:center;transition:transform .2s,color .15s;
  flex-shrink:0;line-height:1;
}
.month-toggle.collapsed{transform:rotate(-90deg)}
.month-del{
  width:22px;height:22px;border-radius:6px;border:0.5px solid transparent;
  background:transparent;cursor:pointer;color:var(--text3);font-size:14px;
  display:flex;align-items:center;justify-content:center;transition:color .15s,background .15s;
  flex-shrink:0;opacity:0;
}
.month-header:hover .month-del{opacity:1}
.month-del:hover{color:var(--ph);background:rgba(255,74,74,0.1)}

/* BODY */
.month-body{display:block}

/* TASKS */
.tasks-list{padding:8px 12px;display:flex;flex-direction:column;gap:3px}

.task-item{
  display:flex;align-items:center;gap:8px;padding:6px 8px;
  border-radius:7px;background:var(--bg3);border:0.5px solid transparent;
  transition:border-color .15s,opacity .15s,background .15s;
  cursor:grab;
}
.task-item:active{cursor:grabbing}
.task-item:hover{border-color:var(--border2)}
.task-item.done{opacity:.42}
.task-item.done .task-text{text-decoration:line-through}
.task-item.hi{background:var(--hi-bg);border-color:var(--hi-border)}
.task-item.hi .task-text{color:var(--hi)}
.task-item.dragging{opacity:.35;border-style:dashed;border-color:var(--accent)}
.task-item.drag-placeholder{background:rgba(61,111,255,0.08);border:1px dashed var(--accent);min-height:32px}

.prio-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;cursor:pointer;transition:transform .15s}
.prio-dot:hover{transform:scale(1.6)}
.task-text{font-size:12px;color:var(--text);flex:1;line-height:1.4;user-select:none;cursor:pointer}

.task-edit-input{
  flex:1;background:var(--bg);border:0.5px solid var(--accent);border-radius:5px;
  padding:2px 7px;font-family:'Golos Text',sans-serif;font-size:12px;color:var(--text);
  outline:none;
}

.task-done-btn{
  width:17px;height:17px;border-radius:50%;border:1.5px solid var(--border2);background:transparent;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;color:transparent;font-size:9px;
}
.task-done-btn:hover{border-color:var(--accent2);color:var(--accent2)}
.task-item.done .task-done-btn{background:var(--accent);border-color:var(--accent);color:#fff}
.task-del-btn{
  width:17px;height:17px;border-radius:4px;border:none;background:transparent;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  color:var(--text3);font-size:13px;transition:color .15s,background .15s;opacity:0;
}
.task-item:hover .task-del-btn,.task-item:focus-within .task-del-btn{opacity:1}
.task-del-btn:hover{color:var(--ph);background:rgba(255,74,74,0.1)}

/* ADD TASK ROW */
.add-area{padding:6px 12px 12px;border-top:0.5px solid var(--border);margin-top:2px}
.milestone-bar{padding:6px 12px;font-size:10px;color:var(--text3);border-top:0.5px solid var(--border);line-height:1.5}
.add-row{display:flex;gap:5px;align-items:center}
.add-input{
  flex:1;background:var(--bg3);border:0.5px solid var(--border);border-radius:7px;
  padding:6px 10px;font-family:'Golos Text',sans-serif;font-size:12px;color:var(--text);outline:none;
  transition:border-color .15s;
}
.add-input::placeholder{color:var(--text3)}
.add-input:focus{border-color:var(--border2)}
.prio-sel{
  background:var(--bg3);border:0.5px solid var(--border);border-radius:7px;
  padding:6px 5px;font-size:13px;color:var(--text2);outline:none;cursor:pointer;
  appearance:none;-webkit-appearance:none;width:34px;text-align:center;flex-shrink:0;
}
.add-btn{background:var(--accent);border:none;border-radius:7px;padding:6px 12px;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s;white-space:nowrap;flex-shrink:0}
.add-btn:hover{opacity:.85}

/* MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;align-items:center;justify-content:center;padding:16px}
.overlay.open{display:flex}
.modal{background:var(--bg2);border:0.5px solid var(--border2);border-radius:18px;padding:24px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto}
.modal-title{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;color:var(--text);margin-bottom:18px;letter-spacing:-.01em}
.modal-title span{color:var(--accent2)}
.field-label{font-size:10px;color:var(--text3);margin-bottom:4px;display:block;letter-spacing:.07em;text-transform:uppercase}
.modal-input{width:100%;background:var(--bg3);border:0.5px solid var(--border2);border-radius:9px;padding:9px 12px;font-family:'Golos Text',sans-serif;font-size:13px;color:var(--text);outline:none;transition:border-color .15s;margin-bottom:12px}
.modal-input:focus{border-color:var(--accent)}
.modal-input::placeholder{color:var(--text3)}
.color-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.color-opt{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:border-color .15s,transform .15s;flex-shrink:0}
.color-opt:hover{transform:scale(1.15)}
.color-opt.sel{border-color:#fff}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{background:var(--bg3);border:0.5px solid var(--border2);border-radius:9px;padding:9px 16px;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;color:var(--text2);cursor:pointer;transition:opacity .15s}
.btn-cancel:hover{opacity:.8}
.btn-confirm{background:var(--accent);border:none;border-radius:9px;padding:9px 18px;font-family:'Unbounded',sans-serif;font-size:10px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s}
.btn-confirm:hover{opacity:.85}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--bg2);border:0.5px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:12px;color:var(--text2);z-index:999;transition:transform .25s ease;white-space:nowrap;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0)}

footer{padding:12px 28px;border-top:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.footer-l{font-family:'Unbounded',sans-serif;font-size:9px;font-weight:300;color:var(--text3);letter-spacing:.08em}

/* ── TABLET ── */
@media(max-width:1100px){
  .months{grid-template-columns:repeat(2,minmax(0,1fr));align-items:start}
}
/* ── MOBILE ── */
@media(max-width:640px){
  header{
    padding:12px 12px 12px;gap:8px;
    flex-direction:column;align-items:stretch;
    width:100%;
  }
  .logo{font-size:16px}
  .header-right{
    display:flex;flex-direction:row;align-items:center;
    gap:6px;width:100%;flex-wrap:nowrap;
  }
  .header-stats{display:flex;flex-direction:row;gap:5px;flex:1;min-width:0}
  .hstat{padding:5px 8px;min-width:0;flex:1}
  .hstat-n{font-size:14px}
  .hstat-l{font-size:9px}
  .btn{padding:7px 10px;font-size:10px;white-space:nowrap;flex-shrink:0}
  .sync-dot{flex-shrink:0}
  .progress-wrap,.legend,.months,footer{padding-left:12px;padding-right:12px;width:100%}
  .months{grid-template-columns:minmax(0,1fr);gap:10px;padding-top:12px}
  .month-name{font-size:11px}
  .legend{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo">Задачник <span>Геккина</span></div>
  <div class="header-right">
    <div class="header-stats">
      <div class="hstat"><div class="hstat-n" id="s-total">0</div><div class="hstat-l">задач</div></div>
      <div class="hstat"><div class="hstat-n" id="s-done">0</div><div class="hstat-l">готово</div></div>
      <div class="hstat"><div class="hstat-n" id="s-left">0</div><div class="hstat-l">осталось</div></div>
    </div>
    <div class="sync-dot" id="sync-dot" title="Статус синхронизации"></div>
    <button class="btn btn-ghost" onclick="openModal()">+ месяц</button>
  </div>
</header>

<div class="progress-wrap">
  <div class="progress-track"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  <div class="progress-label" id="plabel">загрузка...</div>
</div>

<div class="legend">
  <div class="leg"><div class="leg-dot" style="background:var(--ph)"></div>высокий</div>
  <div class="leg"><div class="leg-dot" style="background:var(--pm)"></div>средний</div>
  <div class="leg"><div class="leg-dot" style="background:var(--pl)"></div>низкий</div>
  <div class="leg"><div class="leg-dot" style="background:var(--hi);opacity:.9"></div>выделено</div>
  <div class="leg" style="color:var(--text3)">· клик по тексту — выделить · двойной клик — редактировать · точка — приоритет · перетащи задачу между месяцами</div>
</div>

<div class="months" id="months-container"></div>

<footer>
  <div class="footer-l">ЗАДАЧНИК ГЕККИНА · 3XMEDIA PRODUCTION</div>
  <div class="footer-l" id="save-info">инициализация...</div>
</footer>

<div class="overlay" id="overlay" onclick="closeOnOverlay(event)">
  <div class="modal">
    <div class="modal-title">Новый <span>месяц</span></div>
    <label class="field-label">Название</label>
    <input class="modal-input" id="m-name" type="text" placeholder="Октябрь" maxlength="40" onkeydown="if(event.key==='Enter')confirmAdd()">
    <label class="field-label">Подзаголовок</label>
    <input class="modal-input" id="m-sub" type="text" placeholder="Краткое описание..." maxlength="80">
    <label class="field-label">Контрольная точка</label>
    <input class="modal-input" id="m-mile" type="text" placeholder="Цель к концу месяца" maxlength="120">
    <label class="field-label">Цвет</label>
    <div class="color-row" id="color-row"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-confirm" onclick="confirmAdd()">Создать</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

function localLoad(){
  try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r)}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULTS));
}
function localSave(){
  try{localStorage.setItem(KEY,JSON.stringify(DATA))}catch(e){}
}

async function sbLoad(){
  if(!USING_SUPABASE)return null;
  try{
    const{data,error}=await sb.from('gekkina_data').select('payload').eq('key','main').maybeSingle();
    if(error)throw error;
    return data?.payload||null;
  }catch(e){console.error('sbLoad',e);return null}
}
async function sbSave(){
  if(!USING_SUPABASE)return;
  setSync('loading');
  try{
    const{error}=await sb.from('gekkina_data').upsert({key:'main',payload:DATA},{onConflict:'key'});
    if(error)throw error;
    setSync('ok');
    document.getElementById('save-info').textContent='синхронизировано · '+new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  }catch(e){
    console.error('sbSave',e);setSync('err');
    document.getElementById('save-info').textContent='ошибка синхронизации';
  }
}

let saveTimer;
function saveData(){
  localSave();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(sbSave,800);
  if(!USING_SUPABASE){
    document.getElementById('save-info').textContent='локально · '+new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
  }
}

async function init(){
  if(USING_SUPABASE){
    setSync('loading');
    const remote=await sbLoad();
    if(remote&&Array.isArray(remote)&&remote.length){
      DATA=remote;localSave();setSync('ok');
    } else {
      DATA=localLoad();
      if(!DATA.length)DATA=JSON.parse(JSON.stringify(DEFAULTS));
      sbSave();
    }
  } else {
    setSync('');
    DATA=localLoad();
    if(!DATA.length)DATA=JSON.parse(JSON.stringify(DEFAULTS));
    document.getElementById('save-info').textContent='локальный режим (Supabase не подключён)';
  }
  render();
}

// ── HELPERS ──
function mColor(m){return m.color||CMAP[m.id]||'#3D6FFF'}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── ACTIONS ──
function cyclePrio(mid,ti,e){
  e.stopPropagation();
  const m=DATA.find(x=>x.id===mid);if(!m)return;
  m.tasks[ti].p=PRIOS[(PRIOS.indexOf(m.tasks[ti].p)+1)%PRIOS.length];
  saveData();render();
}
function toggleDone(mid,ti,e){
  e.stopPropagation();
  const m=DATA.find(x=>x.id===mid);if(!m)return;
  m.tasks[ti].done=!m.tasks[ti].done;
  saveData();render();
}
function toggleHi(mid,ti,e){
  if(e&&e.target&&(e.target.classList.contains('prio-dot')||e.target.classList.contains('task-done-btn')||e.target.classList.contains('task-del-btn')||e.target.classList.contains('task-edit-input')))return;
  const m=DATA.find(x=>x.id===mid);if(!m)return;
  m.tasks[ti].hi=!m.tasks[ti].hi;
  saveData();render();
}
function delTask(mid,ti,e){
  e.stopPropagation();
  const m=DATA.find(x=>x.id===mid);if(!m)return;
  m.tasks.splice(ti,1);saveData();render();toast('Задача удалена');
}
function delMonth(mid,e){
  e.stopPropagation();
  const m=DATA.find(x=>x.id===mid);if(!m)return;
  if(!confirm('Удалить месяц «'+m.name+'» со всеми задачами?'))return;
  DATA=DATA.filter(x=>x.id!==mid);saveData();render();toast('Месяц удалён');
}
function toggleCollapse(mid,e){
  e.stopPropagation();
  const m=DATA.find(x=>x.id===mid);if(!m)return;
  m.collapsed=!m.collapsed;
  saveData();
  // Toggle without full re-render
  const body=document.getElementById('body-'+mid);
  const btn=document.getElementById('toggle-btn-'+mid);
  const hdr=document.getElementById('hdr-'+mid);
  if(body){body.style.display=m.collapsed?'none':''}
  if(btn){btn.classList.toggle('collapsed',m.collapsed);btn.title=m.collapsed?'Развернуть':'Свернуть'}
  if(hdr){hdr.style.borderBottom=m.collapsed?'none':'0.5px solid var(--border)'}
}
function addTask(mid){
  const inp=document.getElementById('inp-'+mid);
  const sel=document.getElementById('sel-'+mid);
  const txt=inp.value.trim();if(!txt){inp.focus();return}
  const m=DATA.find(x=>x.id===mid);if(!m)return;
  m.tasks.push({t:txt,p:sel.value,done:false,hi:false});
  inp.value='';saveData();render();
  setTimeout(()=>{const el=document.getElementById('inp-'+mid);if(el)el.focus()},30);
}

// ── EDIT ──
let editingKey=null;
function startEdit(mid,ti,e){
  e.stopPropagation();
  editingKey=mid+'-'+ti;
  render();
  setTimeout(()=>{
    const inp=document.getElementById('edit-'+mid+'-'+ti);
    if(inp){inp.focus();inp.select()}
  },20);
}
function commitEdit(mid,ti,e){
  const inp=document.getElementById('edit-'+mid+'-'+ti);
  if(!inp)return;
  const val=inp.value.trim();
  const m=DATA.find(x=>x.id===mid);
  if(m&&val)m.tasks[ti].t=val;
  editingKey=null;
  saveData();render();
}
function editKeydown(mid,ti,e){
  if(e.key==='Enter'){e.preventDefault();commitEdit(mid,ti,e)}
  if(e.key==='Escape'){editingKey=null;render()}
}

// ── DRAG & DROP ──
function onDragStart(mid,ti,e){
  dragSrc={mid,ti};
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain','');
  setTimeout(()=>{
    const el=document.getElementById('task-'+mid+'-'+ti);
    if(el)el.classList.add('dragging');
  },0);
}
function onDragEnd(mid,ti){
  const el=document.getElementById('task-'+mid+'-'+ti);
  if(el)el.classList.remove('dragging');
  document.querySelectorAll('.month-card').forEach(c=>c.classList.remove('drag-over'));
}
function onDragOver(mid,e){
  e.preventDefault();e.dataTransfer.dropEffect='move';
  document.querySelectorAll('.month-card').forEach(c=>c.classList.remove('drag-over'));
  const card=document.getElementById('card-'+mid);
  if(card)card.classList.add('drag-over');
}
function onDrop(mid,e){
  e.preventDefault();
  document.querySelectorAll('.month-card').forEach(c=>c.classList.remove('drag-over'));
  if(!dragSrc||dragSrc.mid===mid)return;
  const src=DATA.find(x=>x.id===dragSrc.mid);
  const dst=DATA.find(x=>x.id===mid);
  if(!src||!dst)return;
  const [task]=src.tasks.splice(dragSrc.ti,1);
  dst.tasks.push(task);
  dragSrc=null;
  saveData();render();
  toast('Задача перемещена в «'+dst.name+'»');
}

// ── MODAL ──
function openModal(){
  document.getElementById('m-name').value='';
  document.getElementById('m-sub').value='';
  document.getElementById('m-mile').value='';
  selColor=PALETTE[0];
  document.querySelectorAll('.color-opt').forEach((x,i)=>x.classList.toggle('sel',i===0));
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-name').focus(),80);
}
function closeModal(){document.getElementById('overlay').classList.remove('open')}
function closeOnOverlay(e){if(e.target===document.getElementById('overlay'))closeModal()}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});
function confirmAdd(){
  const name=document.getElementById('m-name').value.trim();
  if(!name){document.getElementById('m-name').focus();return}
  DATA.push({
    id:'m'+Date.now(),name,
    subtitle:document.getElementById('m-sub').value.trim(),
    milestone:document.getElementById('m-mile').value.trim(),
    color:selColor,collapsed:false,tasks:[]
  });
  saveData();render();closeModal();
  setTimeout(()=>{const cs=document.querySelectorAll('.month-card');if(cs.length)cs[cs.length-1].scrollIntoView({behavior:'smooth',block:'start'})},80);
  toast('Месяц «'+name+'» создан');
}

// ── STATS ──
function updateStats(){
  let tot=0,dn=0;
  DATA.forEach(m=>{tot+=m.tasks.length;dn+=m.tasks.filter(t=>t.done).length});
  const pct=tot?Math.round(dn/tot*100):0;
  document.getElementById('s-total').textContent=tot;
  document.getElementById('s-done').textContent=dn;
  document.getElementById('s-left').textContent=tot-dn;
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('plabel').textContent=pct+'% выполнено — '+dn+' из '+tot+' задач';
}

// ── RENDER ──
function makeTaskHtml(mid, t, i){
  const isEditing = editingKey === mid+'-'+i;
  const pc = PC[t.p]||PC.none;
  let cls = 'task-item';
  if(t.done) cls += ' done';
  if(t.hi)   cls += ' hi';
  const mid_s = mid.replace(/'/g,"\'");
  let textPart;
  if(isEditing){
    textPart = '<input class="task-edit-input" id="edit-'+mid+'-'+i+'" value="'+esc(t.t)+'"'
      +' onblur="commitEdit(''+mid_s+'','+i+',event)"'
      +' onkeydown="editKeydown(''+mid_s+'','+i+',event)"'
      +' onclick="event.stopPropagation()">';
  } else {
    textPart = '<span class="task-text"'
      +' onclick="toggleHi(''+mid_s+'','+i+',event)"'
      +' ondblclick="startEdit(''+mid_s+'','+i+',event)"'
      +' title="Клик — выделить · двойной клик — редактировать">'+esc(t.t)+'</span>';
  }
  return '<div class="'+cls+'" id="task-'+mid+'-'+i+'"'
    +' draggable="true"'
    +' ondragstart="onDragStart(''+mid_s+'','+i+',event)"'
    +' ondragend="onDragEnd(''+mid_s+'','+i+')">'
    +'<div class="prio-dot" style="background:'+pc+'" title="Сменить приоритет" onclick="cyclePrio(''+mid_s+'','+i+',event)"></div>'
    +textPart
    +'<button class="task-done-btn" onclick="toggleDone(''+mid_s+'','+i+',event)" title="'+(t.done?'Снять':'Готово')+'">✓</button>'
    +'<button class="task-del-btn" onclick="delTask(''+mid_s+'','+i+',event)" title="Удалить">×</button>'
    +'</div>';
}

function render(){
  const c = document.getElementById('months-container');
  c.innerHTML = '';

  DATA.forEach(month=>{
    const col      = mColor(month);
    const dn       = month.tasks.filter(t=>t.done).length;
    const collapsed = !!month.collapsed;
    const mid      = month.id;

    // ── card wrapper
    const card = document.createElement('div');
    card.className = 'month-card';
    card.id = 'card-'+mid;
    card.addEventListener('dragover', e=>onDragOver(mid,e));
    card.addEventListener('drop',     e=>onDrop(mid,e));

    // ── header
    const hdr = document.createElement('div');
    hdr.className = 'month-header';
    hdr.id = 'hdr-'+mid;
    hdr.style.borderBottom = collapsed ? 'none' : '0.5px solid var(--border)';
    hdr.innerHTML =
      '<div class="month-dot" style="background:'+col+'"></div>'
      +'<div class="month-info" onclick="toggleCollapse(''+mid+'',event)" style="cursor:pointer">'
        +'<div class="month-name" style="color:'+col+'">'+esc(month.name)+'</div>'
        +(month.subtitle ? '<div class="month-subtitle">'+esc(month.subtitle)+'</div>' : '')
      +'</div>'
      +'<div class="month-count">'+dn+'/'+month.tasks.length+'</div>'
      +'<button class="month-toggle'+(collapsed?' collapsed':'')+'" id="toggle-btn-'+mid+'"'
        +' onclick="toggleCollapse(''+mid+'',event)"'
        +' title="'+(collapsed?'Развернуть':'Свернуть')+'">▾</button>'
      +'<button class="month-del" onclick="delMonth(''+mid+'',event)" title="Удалить месяц">×</button>';
    card.appendChild(hdr);

    // ── body (always in DOM, hidden via display:none when collapsed)
    const body = document.createElement('div');
    body.className = 'month-body';
    body.id = 'body-'+mid;
    body.style.display = collapsed ? 'none' : '';

    // tasks list
    const tl = document.createElement('div');
    tl.className = 'tasks-list';
    tl.id = 'tl-'+mid;
    if(month.tasks.length === 0){
      tl.innerHTML = '<div style="font-size:11px;color:var(--text3);padding:6px 2px">Задач нет — добавь ниже</div>';
    } else {
      tl.innerHTML = month.tasks.map((t,i)=>makeTaskHtml(mid,t,i)).join('');
    }
    body.appendChild(tl);

    // milestone
    if(month.milestone){
      const ms = document.createElement('div');
      ms.className = 'milestone-bar';
      ms.textContent = '→ '+month.milestone;
      body.appendChild(ms);
    }

    // add row
    const addArea = document.createElement('div');
    addArea.className = 'add-area';
    addArea.innerHTML =
      '<div class="add-row">'
      +'<input class="add-input" id="inp-'+mid+'" type="text" placeholder="Новая задача..." maxlength="200"'
        +' onkeydown="if(event.key==='Enter')addTask(''+mid+'')">'
      +'<select class="prio-sel" id="sel-'+mid+'">'
        +'<option value="high">🔴</option>'
        +'<option value="mid" selected>🟡</option>'
        +'<option value="low">🟢</option>'
        +'<option value="none">⚪</option>'
      +'</select>'
      +'<button class="add-btn" onclick="addTask(''+mid+'')">+ добавить</button>'
      +'</div>';
    body.appendChild(addArea);

    card.appendChild(body);
    c.appendChild(card);
  });
  updateStats();
}

init();
</script>
